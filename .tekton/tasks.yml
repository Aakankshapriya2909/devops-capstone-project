apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
spec:
  workspaces:
    - name: source
  steps:
    - name: pipeline-cleanup
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "Cleaning build workspace environment..."
        rm -rf *
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test-task
spec:
  workspaces:
    - name: source
  steps:
    - name: flake8-lint
      image: python:3.10-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install flake8
        flake8 . --count --exit-zero
    - name: run-nose-tests
      image: python:3.10-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install -r requirements.txt
        nosetests
